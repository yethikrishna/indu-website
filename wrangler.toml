name = "indu-foundation"
compatibility_date = "2024-01-01"

[build]
command = "npm run build"
cwd = "."
watch_dir = "src"

[[build.upload.rules]]
type = "ESModule"
globs = ["**/*.js"]

[site]
bucket = ".svelte-kit/cloudflare"

[vars]
PUBLIC_APP_URL = "https://indu.dev"
PUBLIC_ENABLE_PLAYGROUND = "true"
